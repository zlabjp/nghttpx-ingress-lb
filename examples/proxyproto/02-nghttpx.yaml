apiVersion: v1
kind: ConfigMap
metadata:
  name: nghttpx-ingress-lb-config
  namespace: kube-system
data:
  nghttpx-conf: |
    add-x-forwarded-for=yes
    strip-incoming-x-forwarded-for=yes
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nghttpx-ingress-controller
  namespace: kube-system
  labels:
    k8s-app: nghttpx-ingress-lb
spec:
  selector:
    matchLabels:
      k8s-app: nghttpx-ingress-lb
  template:
    metadata:
      labels:
        k8s-app: nghttpx-ingress-lb
        name: nghttpx-ingress-lb
    spec:
      serviceAccountName: nghttpx-ingress-serviceaccount
      terminationGracePeriodSeconds: 60
      hostNetwork: true # disable this if you do not need CNI
      containers:
      - image: ghcr.io/zlabjp/nghttpx-ingress-controller:latest
        name: nghttpx-ingress-lb
        imagePullPolicy: Always
        startupProbe:
          httpGet:
            path: /readyz
            # when changing this port, also specify it using --healthz-port in nghttpx-ingress-controller args.
            port: 11249
            scheme: HTTP
          failureThreshold: 30
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            # when changing this port, also specify it using --healthz-port in nghttpx-ingress-controller args.
            port: 11249
            scheme: HTTP
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            # when changing this port, also specify it using --healthz-port in nghttpx-ingress-controller args.
            port: 11249
            scheme: HTTP
          timeoutSeconds: 5
        # use downward API
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        ports:
        - name: http-ingress
          containerPort: 80
          hostPort: 80
        - name: tls-ingress
          containerPort: 443
          hostPort: 443
        args:
        - /nghttpx-ingress-controller
        - --nghttpx-configmap=$(POD_NAMESPACE)/nghttpx-ingress-lb-config
        - --healthz-port=11249
        - --proxy-proto=true
        securityContext:
          capabilities:
            add:
            - NET_BIND_SERVICE
            # The following capabilities are required to load eBPF
            # program that is used by HTTP/3.  They can be omitted if
            # the container image is built without HTTP/3 support, by
            # using --build-arg ENABLE_HTTP3=false.
            - BPF
            - PERFMON
            - SYS_RESOURCE
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        volumeMounts:
        - mountPath: /etc/nghttpx
          name: conf
        - mountPath: /tmp
          name: tmp
      volumes:
      - emptyDir: {}
        name: conf
      - emptyDir: {}
        name: tmp
